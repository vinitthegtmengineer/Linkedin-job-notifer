name: LinkedIn Notifier (Free 24/7)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: linkedin-notifier
  cancel-in-progress: true

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run one notifier cycle
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
          MAX_ALERTS_PER_CYCLE: "5"
          MAX_POST_AGE_HOURS: "24"
          REQUIRE_REMOTE: "0"
          STARTUP_PING: "0"
          DAILY_SUMMARY: "0"
          RUN_ONCE: "1"
        run: node linkedin-notifier.js
        timeout-minutes: 8

      - name: Persist seen state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seenLinkedin.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update notifier state [skip ci]"
            git pull --rebase origin main || true
            git push || true
          else
            echo "No state changes"
          fi
